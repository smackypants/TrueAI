name: Auto Bug-Fix (Scan + PR + Auto-Merge)

# Runs safe, deterministic auto-fixes on the codebase (ESLint --fix, etc.),
# opens a PR back to main, and enables auto-merge so it lands hands-off once
# required checks pass.
#
# BEHAVIOR:
#   1. Scan: npm ci → typecheck → lint(scan) → test → build (skips if script absent)
#   2. If ESLint --fix produces changes: create unique branch (one per run), commit, open PR
#   3. Enable auto-merge (squash) so PR lands once required checks/approvals pass
#   4. If scan finds unfixable errors (lint/build/test/android failures), dispatch Copilot fix issue
#
# GOVERNANCE ENFORCED:
#   - Refuses changes to .github/**, LICENSE, NOTICE
#   - Diff size capped at MAX_DIFF_LINES (additions+deletions)
#   - No bypass of required checks / CODEOWNERS

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scan only, do not open a PR'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: auto-bugfix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  MAX_DIFF_LINES: '200'
  FIX_BRANCH_PREFIX: 'copilot/fix-audit-lint'
  MAX_ISSUE_OUTPUT_LINES: '50'

jobs:
  scan-and-fix:
    name: Scan + auto-fix + open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- Detect project layout --------------------------------------------
      - name: Detect project layout (Node + Android)
        id: layout
        run: |
          HAS_NODE=false
          [ -f package.json ] && HAS_NODE=true

          HAS_ANDROID=false
          # trueai-localai uses android/gradlew (wrapper under android/)
          if [ -f android/gradlew ] || [ -d android ]; then
            HAS_ANDROID=true
          fi

          echo "has_node=$HAS_NODE" >> "$GITHUB_OUTPUT"
          echo "has_android=$HAS_ANDROID" >> "$GITHUB_OUTPUT"

      # ---- Node toolchain ----------------------------------------------------
      - name: Set up Node.js 24
        if: steps.layout.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        id: install
        if: steps.layout.outputs.has_node == 'true'
        run: npm ci

      - name: Detect available npm scripts
        id: scripts
        if: steps.layout.outputs.has_node == 'true'
        run: |
          has_script() {
            node -e "
              const p = require('./package.json');
              process.exit(p.scripts && p.scripts['$1'] ? 0 : 1);
            " 2>/dev/null && echo true || echo false
          }
          echo "has_lint=$(has_script lint)"               >> "$GITHUB_OUTPUT"
          echo "has_test=$(has_script test)"               >> "$GITHUB_OUTPUT"
          echo "has_build=$(has_script build)"             >> "$GITHUB_OUTPUT"
          echo "has_build_dev=$(has_script build:dev)"     >> "$GITHUB_OUTPUT"
          echo "has_typecheck=$(has_script typecheck)"     >> "$GITHUB_OUTPUT"

      - name: Run typecheck
        id: typecheck
        if: steps.scripts.outputs.has_typecheck == 'true'
        run: |
          set +e
          npm run typecheck 2>&1 | tee /tmp/typecheck-output.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run ESLint (scan, no fix yet)
        id: lint_scan
        if: steps.scripts.outputs.has_lint == 'true'
        run: |
          set +e
          npm run lint -- --format json --output-file /tmp/lint-scan.json > /tmp/lint-scan.stdout 2> /tmp/lint-scan.stderr
          LINT_EXIT=$?
          set -e

          ERRORS=0
          if [ -f /tmp/lint-scan.json ]; then
            ERRORS=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('/tmp/lint-scan.json','utf8'));
              console.log(r.reduce((s,f) => s + f.messages.filter(m=>m.severity===2).length, 0));
            " 2>/dev/null || echo 0)
          fi

          echo "exit=$LINT_EXIT"     >> "$GITHUB_OUTPUT"
          echo "error_count=$ERRORS" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: tests
        if: steps.scripts.outputs.has_test == 'true'
        run: |
          set +e
          npm test -- --run 2>&1 | tee /tmp/test-output.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run build:dev
        id: build_dev
        if: steps.scripts.outputs.has_build_dev == 'true'
        run: |
          set +e
          npm run build:dev 2>&1 | tee /tmp/build-dev-output.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run build
        id: build
        if: steps.scripts.outputs.has_build == 'true'
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/build-output.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      # ---- Auto-fix ----------------------------------------------------------
      - name: Apply ESLint --fix
        id: lint_fix
        if: >
          steps.scripts.outputs.has_lint == 'true' &&
          steps.lint_scan.outputs.error_count != '0'
        run: |
          echo "attempted=true" >> "$GITHUB_OUTPUT"

          set +e
          npm run lint -- --fix --format json --output-file /tmp/lint-after.json > /tmp/lint-fix.stdout 2> /tmp/lint-fix.stderr
          set -e

          REMAINING=0
          if [ -f /tmp/lint-after.json ]; then
            REMAINING=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('/tmp/lint-after.json','utf8'));
              const errs = [];
              r.forEach(f => f.messages.forEach(m => {
                if (m.severity===2) errs.push(f.filePath+':'+m.line+' ['+m.ruleId+'] '+m.message);
              }));
              require('fs').writeFileSync('/tmp/lint-remaining.txt', errs.join('\n'));
              console.log(errs.length);
            " 2>/dev/null || echo 0)
          fi
          echo "remaining=$REMAINING" >> "$GITHUB_OUTPUT"

      # ---- Android toolchain + checks (always when android exists) -----------
      - name: Set up JDK 21 (Android)
        if: steps.layout.outputs.has_android == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        if: steps.layout.outputs.has_android == 'true'
        uses: android-actions/setup-android@v3

      - name: Android Gradle checks (lint + unit tests + assembleDebug)
        id: android_checks
        if: steps.layout.outputs.has_android == 'true'
        run: |
          set +e
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew

            (cd android && ./gradlew --version)

            (cd android && ./gradlew lint test) 2>&1 | tee /tmp/android-lint-test-output.txt
            LT_EXIT=$?

            (cd android && ./gradlew assembleDebug) 2>&1 | tee /tmp/android-assemble-output.txt
            A_EXIT=$?

            if [ "$LT_EXIT" -ne 0 ] || [ "$A_EXIT" -ne 0 ]; then
              EXIT=1
            else
              EXIT=0
            fi
          else
            echo "No android/gradlew found; skipping Android checks." | tee /tmp/android-lint-test-output.txt
            EXIT=0
          fi

          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          set -e

      # ---- Governance + diff guard ------------------------------------------
      - name: Governance guard (forbidden paths)
        id: governance
        run: |
          set -e

          if git diff --name-only | grep -E '^\.github/'; then
            echo "Forbidden: .github/** modified" >&2
            exit 1
          fi

          if git diff --name-only | grep -E '^(LICENSE|NOTICE)$'; then
            echo "Forbidden: LICENSE/NOTICE modified" >&2
            exit 1
          fi

      - name: Check diff size
        id: diff_check
        run: |
          CHANGED=$(git diff --numstat | awk '{add+=$1; del+=$2} END {print add+del+0}')
          echo "changed_lines=$CHANGED" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED" -gt "$MAX_DIFF_LINES" ]; then
            echo "too_large=true" >> "$GITHUB_OUTPUT"
          else
            echo "too_large=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Create PR (one PR per run) ---------------------------------------
      - name: Create fix branch and open PR (one per run)
        id: open_pr
        if: >
          github.event.inputs.dry_run != 'true' &&
          steps.diff_check.outputs.too_large == 'false' &&
          steps.lint_fix.outputs.attempted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "no_changes=false" >> "$GITHUB_OUTPUT"

          DATE=$(date -u '+%Y-%m-%d')
          BRANCH="${FIX_BRANCH_PREFIX}-${DATE}-run${{ github.run_id }}-att${{ github.run_attempt }}"

          git checkout -B "$BRANCH"
          git commit -m "chore: auto-fix ESLint violations [${DATE}]"
          git push --force-with-lease origin "$BRANCH"

          REMAINING="${{ steps.lint_fix.outputs.remaining }}"
          REMAINING="${REMAINING:-0}"

          PR_BODY="$(cat <<EOF
## Automated ESLint auto-fix

This PR was opened automatically by the **Auto Bug-Fix** workflow.

### What changed
- Applied \`eslint --fix\` to all auto-correctable lint violations.
- Changed lines: ${{ steps.diff_check.outputs.changed_lines }} (cap: ${MAX_DIFF_LINES}).

### Remaining unfixable ESLint errors: ${REMAINING}
$(if [ "$REMAINING" -gt "0" ]; then echo "⚠️ ${REMAINING} errors could not be auto-fixed. A separate Copilot fix issue will be dispatched."; else echo "✅ All lint errors were resolved automatically."; fi)

### Checks run (this workflow)
- \`npm ci\` ✅
$([ '${{ steps.scripts.outputs.has_typecheck }}' = 'true' ] && echo "- \`npm run typecheck\`: exit ${{ steps.typecheck.outputs.exit }}" || echo "- typecheck: not configured")
$([ '${{ steps.scripts.outputs.has_lint }}' = 'true' ] && echo "- \`npm run lint --fix\` ✅" || echo "- lint: not configured")
$([ '${{ steps.scripts.outputs.has_test }}' = 'true' ] && echo "- \`npm test\`: exit ${{ steps.tests.outputs.exit }}" || echo "- test: not configured")
$([ '${{ steps.scripts.outputs.has_build_dev }}' = 'true' ] && echo "- \`npm run build:dev\`: exit ${{ steps.build_dev.outputs.exit }}" || echo "- build:dev: not configured")
$([ '${{ steps.scripts.outputs.has_build }}' = 'true' ] && echo "- \`npm run build\`: exit ${{ steps.build.outputs.exit }}" || echo "- build: not configured")
$([ '${{ steps.layout.outputs.has_android }}' = 'true' ] && echo "- Android \`(cd android && ./gradlew lint test assembleDebug)\`: exit ${{ steps.android_checks.outputs.exit }}" || echo "- Android: not detected")

### Auto-merge behaviour
Auto-merge (squash) is enabled on this PR. GitHub will merge it automatically once
all required status checks pass and required approvals (CODEOWNERS, etc.) are satisfied.

### Governance
- ❌ \`LICENSE\` / \`NOTICE\` not modified
- ❌ \`.github/**\` not modified
EOF
)"

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-fix audit lint violations [${DATE}] (run ${{ github.run_id }})" \
            --body "$PR_BODY")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"  >> "$GITHUB_OUTPUT"

          gh pr edit "$PR_URL" --add-reviewers "smackypants" 2>/dev/null || \
            echo "⚠️ Could not add reviewer — approve manually if required."

      - name: Enable auto-merge on fix PR
        if: >
          steps.open_pr.outputs.no_changes == 'false' &&
          steps.open_pr.outputs.pr_url != '' &&
          github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      # ---- Labels (created once) --------------------------------------------
      - name: Ensure labels exist
        if: >
          (steps.lint_fix.outputs.remaining != '' && steps.lint_fix.outputs.remaining != '0') ||
          (steps.android_checks.outputs.exit != '' && steps.android_checks.outputs.exit != '0') ||
          (steps.build_dev.outputs.exit != '' && steps.build_dev.outputs.exit != '0') ||
          (steps.tests.outputs.exit != '' && steps.tests.outputs.exit != '0') ||
          (steps.build.outputs.exit != '' && steps.build.outputs.exit != '0')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "copilot-fix"  --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force
          gh label create "lint-error"   --color "fbca04" --description "ESLint error"                        --repo "$REPO" --force
          gh label create "test-failure" --color "d73a4a" --description "Test or build failure"               --repo "$REPO" --force
          gh label create "android"      --color "1d76db" --description "Android-related"                     --repo "$REPO" --force
          gh label create "bug"          --color "ee0701" --description "Something is not working"            --repo "$REPO" --force

      # ---- Copilot issue: unfixable lint ------------------------------------
      - name: Dispatch Copilot fix issue for unfixable lint errors
        if: >
          steps.lint_fix.outputs.remaining != '' &&
          steps.lint_fix.outputs.remaining != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          AUDIT_DATE=$(date -u '+%Y-%m-%d')
          REMAINING="${{ steps.lint_fix.outputs.remaining }}"
          ERROR_LIST=$(head -100 /tmp/lint-remaining.txt 2>/dev/null || echo "(error list unavailable)")

          BODY="## Auto-generated by Auto Bug-Fix workflow

          | Field | Value |
          |---|---|
          | **Bug type** | \`lint-error\` |
          | **Error count** | $REMAINING |
          | **Date** | $AUDIT_DATE |
          | **Run** | https://github.com/$REPO/actions/runs/${{ github.run_id }} |

          ### ESLint errors that could not be auto-fixed (first 100)

          \`\`\`
          $ERROR_LIST
          \`\`\`

          ### Constraints the fix MUST satisfy
          - [ ] \`npm run lint\` exits 0
          - [ ] \`npm test\` passes (if configured)
          - [ ] \`npm run build:dev\` succeeds (if configured)
          - [ ] Android checks succeed (if present): \`(cd android && ./gradlew lint test assembleDebug)\`
          - [ ] \`package.json\` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent
          1. Fix the lint errors without blanket \`eslint-disable\`.
          2. Re-run relevant checks, including Android if present.
          3. Open a PR against \`main\`."

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[Auto] Unfixable ESLint errors detected on main (${AUDIT_DATE})" \
            --body "$BODY" \
            --label "copilot-fix,lint-error,bug" \
            --assignee "copilot")
          echo "Dispatched Copilot fix issue: $ISSUE_URL"

      # ---- Copilot issue: any build/test/android failures -------------------
      - name: Dispatch Copilot fix issue for build/test/Android failures
        if: >
          (steps.android_checks.outputs.exit != '' && steps.android_checks.outputs.exit != '0') ||
          (steps.build_dev.outputs.exit != '' && steps.build_dev.outputs.exit != '0') ||
          (steps.tests.outputs.exit != '' && steps.tests.outputs.exit != '0') ||
          (steps.build.outputs.exit != '' && steps.build.outputs.exit != '0')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          AUDIT_DATE=$(date -u '+%Y-%m-%d')
          ANDROID_EXIT="${{ steps.android_checks.outputs.exit }}"
          BUILD_DEV_EXIT="${{ steps.build_dev.outputs.exit }}"
          BUILD_EXIT="${{ steps.build.outputs.exit }}"
          TEST_EXIT="${{ steps.tests.outputs.exit }}"

          FAILURES=""

          if [ "${ANDROID_EXIT}" != "" ] && [ "${ANDROID_EXIT}" != "0" ]; then
            FAILURES="${FAILURES}
          #### Android (cd android && ./gradlew lint test assembleDebug)
          \`\`\`
          $(tail -"${MAX_ISSUE_OUTPUT_LINES}" /tmp/android-lint-test-output.txt 2>/dev/null || echo "(output unavailable)")
          \`\`\`
          \`\`\`
          $(tail -"${MAX_ISSUE_OUTPUT_LINES}" /tmp/android-assemble-output.txt 2>/dev/null || echo "(output unavailable)")
          \`\`\`"
          fi

          if [ "${BUILD_DEV_EXIT}" != "" ] && [ "${BUILD_DEV_EXIT}" != "0" ]; then
            FAILURES="${FAILURES}
          #### \`npm run build:dev\` (exit ${BUILD_DEV_EXIT})
          \`\`\`
          $(tail -"${MAX_ISSUE_OUTPUT_LINES}" /tmp/build-dev-output.txt 2>/dev/null || echo "(output unavailable)")
          \`\`\`"
          fi

          if [ "${TEST_EXIT}" != "" ] && [ "${TEST_EXIT}" != "0" ]; then
            FAILURES="${FAILURES}
          #### \`npm test\` (exit ${TEST_EXIT})
          \`\`\`
          $(tail -"${MAX_ISSUE_OUTPUT_LINES}" /tmp/test-output.txt 2>/dev/null || echo "(output unavailable)")
          \`\`\`"
          fi

          if [ "${BUILD_EXIT}" != "" ] && [ "${BUILD_EXIT}" != "0" ]; then
            FAILURES="${FAILURES}
          #### \`npm run build\` (exit ${BUILD_EXIT})
          \`\`\`
          $(tail -"${MAX_ISSUE_OUTPUT_LINES}" /tmp/build-output.txt 2>/dev/null || echo "(output unavailable)")
          \`\`\`"
          fi

          BODY="## Auto-generated by Auto Bug-Fix workflow

          One or more checks failed on \`main\`.

          | Field | Value |
          |---|---|
          | **Date** | $AUDIT_DATE |
          | **Run** | https://github.com/$REPO/actions/runs/${{ github.run_id }} |
          | **Android exit** | ${ANDROID_EXIT:-skipped} |
          | **build:dev exit** | ${BUILD_DEV_EXIT:-skipped} |
          | **test exit** | ${TEST_EXIT:-skipped} |
          | **build exit** | ${BUILD_EXIT:-skipped} |

          ### Failure details
          ${FAILURES}

          ### Constraints the fix MUST satisfy
          - [ ] \`npm run lint\` exits 0 (no new errors)
          - [ ] Unit tests pass (\`npm test\`) if configured
          - [ ] Node builds succeed (\`npm run build(:dev)\`) if configured
          - [ ] Android checks succeed (if present): \`(cd android && ./gradlew lint test assembleDebug)\`
          - [ ] \`package.json\` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent
          1. Reproduce the failing command(s).
          2. Apply a minimal fix.
          3. Validate Node + Android checks as applicable.
          4. Open a PR against \`main\`."

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[Auto] Build/test/Android failure detected on main (${AUDIT_DATE})" \
            --body "$BODY" \
            --label "copilot-fix,bug,test-failure,android" \
            --assignee "copilot")
          echo "Dispatched Copilot fix issue: $ISSUE_URL"

      # ---- Artifacts + summary ----------------------------------------------
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-bugfix-logs-${{ github.run_id }}
          path: |
            /tmp/*output*.txt
            /tmp/*.json
            /tmp/lint-remaining.txt
            /tmp/*.stdout
            /tmp/*.stderr

      - name: Write step summary
        if: always()
        run: |
          echo "## Auto Bug-Fix Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node detected | ${{ steps.layout.outputs.has_node }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android detected | ${{ steps.layout.outputs.has_android }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android checks exit | ${{ steps.android_checks.outputs.exit }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Diff changed lines | ${{ steps.diff_check.outputs.changed_lines }} (cap $MAX_DIFF_LINES) |" >> "$GITHUB_STEP_SUMMARY"

          PR_URL="${{ steps.open_pr.outputs.pr_url }}"
          DRY="${{ github.event.inputs.dry_run }}"
          NO_CHANGES="${{ steps.open_pr.outputs.no_changes }}"
          if [ "$DRY" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Mode:** Dry run — no PR opened." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$NO_CHANGES" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** No changes to commit." >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$PR_URL" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** Fix PR opened with auto-merge enabled: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          fi
