name: Release Bump (Tag)

# Manually bump app version + Android versionCode/versionName, update
# CHANGELOG.md, commit, and push the resulting `vX.Y.Z` tag. The existing
# "Create Release with APK" workflow (release.yml) listens for `v*` tags and
# will then build the APKs and publish the GitHub Release automatically.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version, semver only (e.g. 1.0.3 — no leading "v")'
        required: true
      notes:
        description: 'Short release-notes line for CHANGELOG.md'
        required: false
        default: 'Maintenance release.'
  # Reusable: lets publish-release.yml (and any future orchestrator)
  # invoke the bump+tag flow without duplicating its logic.
  workflow_call:
    inputs:
      version:
        description: 'New release version, semver only (e.g. 1.0.3 — no leading "v")'
        required: true
        type: string
      notes:
        description: 'Short release-notes line for CHANGELOG.md'
        required: false
        type: string
        default: 'Maintenance release.'
    outputs:
      version:
        description: 'The validated semver version that was committed and tagged.'
        value: ${{ jobs.bump.outputs.version }}
      tag:
        description: 'The annotated tag that was pushed (vX.Y.Z).'
        value: ${{ jobs.bump.outputs.tag }}

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: v${{ steps.validate.outputs.version }}
      version_code: ${{ steps.bump_gradle.outputs.version_code }}
    steps:
      - name: Checkout (full history needed to push a tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate version input
        id: validate
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' is not valid semver MAJOR.MINOR.PATCH (no leading 'v')."
            exit 1
          fi
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump package.json
        run: |
          set -euo pipefail
          npm --no-git-tag-version version "${{ steps.validate.outputs.version }}"

      - name: Bump android/app/build.gradle (versionName + versionCode)
        id: bump_gradle
        run: |
          set -euo pipefail
          GRADLE=android/app/build.gradle
          NEW_NAME="${{ steps.validate.outputs.version }}"
          OLD_CODE=$(grep -E '^\s*versionCode\s+[0-9]+' "$GRADLE" | head -n1 | awk '{print $2}')
          NEW_CODE=$((OLD_CODE + 1))
          echo "versionCode: $OLD_CODE -> $NEW_CODE"
          echo "versionName: -> $NEW_NAME"
          # Use a sentinel delimiter so slashes in values are safe.
          sed -i -E "s|^(\s*versionCode\s+)[0-9]+|\1${NEW_CODE}|" "$GRADLE"
          sed -i -E "s|^(\s*versionName\s+)\".*\"|\1\"${NEW_NAME}\"|" "$GRADLE"
          # Sanity-check that both lines actually changed format-correctly.
          grep -E '^\s*versionCode\s+'"${NEW_CODE}"'$' "$GRADLE" >/dev/null
          grep -E '^\s*versionName\s+"'"${NEW_NAME}"'"$' "$GRADLE" >/dev/null
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: Write fastlane changelog for new versionCode
        env:
          RAW_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          NEW_CODE="${{ steps.bump_gradle.outputs.version_code }}"
          DEST="fastlane/metadata/android/en-US/changelogs/${NEW_CODE}.txt"
          mkdir -p "$(dirname "$DEST")"
          # Both Play and F-Droid cap "what's new" at 500 chars.
          NOTES=$(printf '%s' "${RAW_NOTES}" | tr '\r' ' ' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          if [ -z "${NOTES}" ]; then
            NOTES="Maintenance release."
          fi
          if [ "${#NOTES}" -gt 500 ]; then
            NOTES="${NOTES:0:497}..."
          fi
          printf '%s\n' "${NOTES}" > "$DEST"
          echo "Wrote $DEST"

      - name: Update F-Droid metadata CurrentVersion / CurrentVersionCode
        run: |
          set -euo pipefail
          META="metadata/com.trueai.localai.yml"
          if [ ! -f "$META" ]; then
            echo "::warning::$META not found; skipping F-Droid metadata bump."
            exit 0
          fi
          NEW_NAME="${{ steps.validate.outputs.version }}"
          NEW_CODE="${{ steps.bump_gradle.outputs.version_code }}"
          sed -i -E "s|^(CurrentVersion:\s*).*|\1${NEW_NAME}|" "$META"
          sed -i -E "s|^(CurrentVersionCode:\s*).*|\1${NEW_CODE}|" "$META"
          grep -E '^CurrentVersion:\s+'"${NEW_NAME}"'$' "$META" >/dev/null
          grep -E '^CurrentVersionCode:\s+'"${NEW_CODE}"'$' "$META" >/dev/null

      - name: Prepend CHANGELOG entry
        env:
          # Pass via env so the value isn't interpolated into the shell script
          # by the runner — avoids quote/newline injection from the input.
          RAW_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          # Collapse newlines, trim, default if empty, and cap length so a
          # pasted essay can't bloat CHANGELOG.md.
          NOTES=$(printf '%s' "${RAW_NOTES}" | tr '\n\r' '  ' | sed -E 's/^ +| +$//g')
          if [ -z "${NOTES}" ]; then
            NOTES="Maintenance release."
          fi
          if [ "${#NOTES}" -gt 280 ]; then
            NOTES="${NOTES:0:277}..."
          fi
          DATE=$(date -u +%Y-%m-%d)
          TMP=$(mktemp)
          {
            # Preserve the file's top-level "# Changelog ..." heading.
            head -n 1 CHANGELOG.md
            echo
            echo "## Version ${VERSION} - ${DATE}"
            echo
            echo "- ${NOTES}"
            echo
            tail -n +2 CHANGELOG.md
          } > "$TMP"
          mv "$TMP" CHANGELOG.md

      - name: Commit, tag, and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          git add package.json package-lock.json android/app/build.gradle CHANGELOG.md fastlane/metadata/android/en-US/changelogs
          # Optional files — only stage them if they exist (so the
          # workflow stays usable on older branches that pre-date the
          # F-Droid metadata).
          if [ -f metadata/com.trueai.localai.yml ]; then
            git add metadata/com.trueai.localai.yml
          fi
          git commit -m "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD
          git push origin "v${VERSION}"
