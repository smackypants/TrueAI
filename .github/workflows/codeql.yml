name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly scan to catch advisories that affect existing code.
    - cron: '23 5 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.28.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.28.3
        with:
          category: "/language:${{ matrix.language }}"
        # The SARIF upload step inside analyze@v3 fails the job with
        # "Code scanning is not enabled for this repository" when the
        # repository hasn't enabled Code Scanning under Settings → Security.
        # We still want CodeQL to *run* on every push/PR so the analysis
        # surfaces errors in the job logs; we just don't want a hard red ❌
        # blocking the branch when the upload is rejected. As soon as Code
        # Scanning is enabled in repo settings the upload will succeed and
        # this becomes a no-op.
        continue-on-error: true
