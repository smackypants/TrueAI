name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly scan to catch advisories that affect existing code.
    - cron: '23 5 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.28.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.28.3
        with:
          category: "/language:${{ matrix.language }}"
        # continue-on-error is controlled by the CODEQL_HARD_GATE repository
        # variable (Settings → Variables → Actions).
        #   CODEQL_HARD_GATE not set / empty / 'false'  → soft gate (default)
        #     The SARIF upload failure does NOT block the PR. Use this when
        #     Code Scanning is not yet enabled under Settings → Security.
        #   CODEQL_HARD_GATE = 'true' → hard gate
        #     The SARIF upload failure DOES block the PR. Set this once Code
        #     Scanning is enabled so alerts gate the default-branch ruleset.
        continue-on-error: ${{ vars.CODEQL_HARD_GATE != 'true' }}
