name: pr-quality

# PR-level unit test + coverage gate (Phase 5).
# Runs on every PR targeting main to catch test regressions before merge.
#
# Hard gate: the job fails if any unit test fails, blocking the merge.
# PR comment: posts a ✅/❌ summary with pass/fail counts and line coverage.
# Copilot issue: when a copilot/* branch PR fails, creates an auto-fix issue.
#
# Required status check context (add to ruleset after merge):
#   pr-quality / Unit tests + coverage

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: tests
        run: |
          set +e
          npm test -- --reporter=json --outputFile /tmp/test-results.json
          TEST_EXIT=$?
          set -e

          FAILED=0
          PASSED=0
          if [ -f /tmp/test-results.json ]; then
            COUNTS=$(node -e "
              const r=require('/tmp/test-results.json');
              console.log((r.numFailedTests||0) + ' ' + (r.numPassedTests||0));
            " 2>/dev/null || echo "0 0")
            FAILED=$(echo "$COUNTS" | cut -d' ' -f1)
            PASSED=$(echo "$COUNTS" | cut -d' ' -f2)
          fi
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "test_exit=$TEST_EXIT" >> "$GITHUB_OUTPUT"
          # Propagate real exit code so the job fails on test failure
          exit $TEST_EXIT

      - name: Run coverage
        id: coverage
        # Always run coverage even if tests failed, to report current level
        if: always()
        run: |
          set +e
          npm run test:coverage
          COV_EXIT=$?
          set -e

          COV_FILE="coverage/coverage-summary.json"
          LINE_PCT=0
          if [ -f "$COV_FILE" ]; then
            LINE_PCT=$(node -e "
              const s=require('./$COV_FILE').total;
              console.log(Math.round(s.lines.pct));
            " 2>/dev/null || echo 0)
          fi
          echo "line_pct=$LINE_PCT" >> "$GITHUB_OUTPUT"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          FAILED: ${{ steps.tests.outputs.failed }}
          PASSED: ${{ steps.tests.outputs.passed }}
          LINE_PCT: ${{ steps.coverage.outputs.line_pct }}
        run: |
          FAILED_N="${FAILED:-0}"
          PASSED_N="${PASSED:-0}"
          LINE_N="${LINE_PCT:-0}"

          if [ "$FAILED_N" = "0" ]; then
            STATUS="✅"
            MSG="All **${PASSED_N}** test(s) passed"
          else
            STATUS="❌"
            MSG="**${FAILED_N}** test(s) failed, ${PASSED_N} passed"
          fi

          COMMENT="## PR Quality Check ${STATUS}

          | Check | Result |
          |---|---|
          | Tests | ${MSG} |
          | Line coverage | ${LINE_N}% |"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT"

      # ── Copilot fix issue for copilot/* branches that fail ────────────────
      - name: Create Copilot fix issue on test failure
        if: >
          failure() &&
          startsWith(github.head_ref, 'copilot/') &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FAILED: ${{ steps.tests.outputs.failed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "copilot-fix"  --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force
          gh label create "test-failure" --color "e4e669" --description "CI / test failure"                   --repo "$REPO" --force
          gh label create "bug"          --color "ee0701" --description "Something is not working"            --repo "$REPO" --force

          AUDIT_DATE=$(date -u '+%Y-%m-%d')
          FAILED_N="${FAILED:-unknown}"

          BODY="## Auto-generated by PR Quality Check

          | Field | Value |
          |---|---|
          | **Bug type** | \`test-failure\` |
          | **Branch** | \`$BRANCH\` |
          | **PR** | [#$PR_NUMBER](https://github.com/$REPO/pull/$PR_NUMBER) |
          | **Failed tests** | $FAILED_N |
          | **Run** | [$RUN_URL]($RUN_URL) |

          ### Constraints the fix MUST satisfy

          - [ ] All existing unit tests still pass (\`npm test\`)
          - [ ] \`npm run lint\` exits 0 (no new errors)
          - [ ] \`npm run build:dev\` succeeds
          - [ ] CodeQL must not introduce new alerts
          - [ ] \`package.json\` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent

          1. Check out branch \`$BRANCH\` and run \`npm test\` to reproduce the failure.
          2. Read the CI run linked above for the full failure output.
          3. Fix only the identified test failure — do not refactor unrelated code.
          4. Run \`npm run lint\`, \`npm run build:dev\`, and \`npm test\` before pushing.
          5. Push to the same branch (\`$BRANCH\`) — do NOT open a new branch.
          6. Fill in the \`## Lessons learned\` section of the PR description."

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[Auto] Unit test failure on $BRANCH" \
            --body "$BODY" \
            --label "copilot-fix,test-failure,bug" \
            --assignee "copilot")
          echo "Created issue: $ISSUE_URL"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "🔴 Unit tests failed on this branch. A fix issue has been dispatched to Copilot: $ISSUE_URL"
