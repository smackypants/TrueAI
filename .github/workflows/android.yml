name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      # Phase 3: Run tsc as a dedicated step so TypeScript errors appear in a
      # clean, labelled step rather than buried in the vite build output.
      # test-failure-autofix.yml detects "error TS" in the log excerpt and
      # generates a TypeScript-specific issue body for the Copilot agent.
      run: npx tsc --noEmit

    - name: Build web app (development mode)
      # The Android CI workflow only assembles `assembleDebug`, so build the
      # JS in development mode too. This keeps `__APP_DEBUG__` true inside the
      # debug APK (enabling auto error reporting under the `debugOnly` gate)
      # and ships unminified React errors with readable stack traces instead
      # of "Minified React error #185". The release pipelines below
      # (build-android.yml, release.yml) keep the production bundle.
      run: npm run build:dev

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build with Gradle
      working-directory: android
      # Product flavors split assembleDebug into assemble{Play,Fdroid}Debug.
      # Build both so PRs catch breakage in either distribution path.
      run: ./gradlew assemblePlayDebug assembleFdroidDebug --no-daemon

    - name: Run Android Lint
      # Phase 6: Run Gradle lint to catch Java/Kotlin code quality issues.
      # Runs after the build so lint can reference compiled class metadata.
      # test-failure-autofix.yml detects lint failures and adds the
      # android-lint label to the dispatched Copilot issue.
      working-directory: android
      run: ./gradlew lintPlayDebug --no-daemon

    - name: Upload Android lint report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: android-lint-report
        # Upload both flavour reports so neither distribution path is invisible
        path: android/app/build/reports/lint-results-*.html
        if-no-files-found: ignore
        retention-days: 14
