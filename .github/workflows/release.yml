name: Create Release with APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Build Android Release APK (unsigned)
        run: cd android && ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Rename APK files
        run: |
          mkdir -p release-artifacts
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk release-artifacts/TrueAI-LocalAI-debug.apk
          fi
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/TrueAI-LocalAI-release-unsigned.apk
          fi

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            # TrueAI LocalAI Release ${{ steps.version.outputs.version }}

            ## Installation

            Download the APK file and install it on your Android device:
            - **TrueAI-LocalAI-debug.apk** - Debug version for testing
            - **TrueAI-LocalAI-release-unsigned.apk** - Release version (unsigned)

            ## What's New in this Release

            - **Active tab persists across reloads** with a validated
              `TabName` guard, so renamed/removed tabs fall back to the
              default cleanly.
            - **Rapid tab switching unblocked** — switches are
              instantaneous (previous throttle removed).
            - **App Builder is now in the Android mobile bottom nav.**
              Phone users can reach it without opening the side menu.
            - **UI aspect-ratio compatibility for Android phones.**
              Layout no longer overflows or crops on common phone
              aspect ratios; safe-area insets, tab bar, and main
              content reflow correctly across narrow / tall viewports.
            - **`package-lock.json` regenerated** so `npm ci` and every
              Android CI workflow succeed cleanly (0 vulnerabilities).
            - **Strict-typecheck warnings in `diagnostics` resolved.**
            - Bumped Android `versionName` to `5.1.0` and `versionCode`
              to `7` so the new APK installs cleanly as an update.

            ## Features

            This release includes:
            - Complete mobile-optimized UI
            - Offline support with Service Worker
            - IndexedDB caching for better performance
            - Android-specific optimizations
            - Full Capacitor integration

            ## Requirements

            - Android 7.0 (API level 24) or higher
            - Approximately 50MB of storage space

            ## Installation Instructions

            1. Download the APK file
            2. Enable "Install from Unknown Sources" in your Android settings
            3. Open the downloaded APK file
            4. Follow the installation prompts
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
