name: Create Release with APK

on:
  push:
    tags:
      - 'v*'
  # Auto-attach APKs whenever a GitHub Release is published (covers cases
  # where the tag push did not trigger release.yml, e.g. releases created
  # via the web UI or the release-bump.yml workflow).
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0) — leave blank to build for the latest published release'
        required: false
        default: ''
  # Reusable: lets publish-release.yml call build-and-release directly
  # after the bump+tag job, so the whole release shows up as one run.
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

# Ensure only one build-and-release runs at a time per tag/ref. If a tag
# push and a workflow_call from publish-release.yml race for the same
# version, the later run waits for the earlier one to finish (rather
# than both trying to upsert the same GitHub Release at once).
concurrency:
  group: release-${{ inputs.version || github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Scopes Play/F-Droid/signing secrets to the `release` environment
    # configured under Settings → Environments. Owner can require
    # manual approval there for an extra gate before any APK ships.
    environment: release
    permissions:
      contents: write

    steps:
      - name: Resolve target tag
        id: resolve
        # For workflow_dispatch with no version: fetch the latest published release tag.
        # For release: [published]: use the event's tag name.
        # For workflow_call / push: tags: v*: inputs.version / github.ref carry the tag.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="$INPUT_VERSION"
          elif [ -n "$RELEASE_TAG" ]; then
            TAG="$RELEASE_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Auto-detect: use the latest published release tag
            TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q '.tagName')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # For workflow_dispatch and workflow_call, check out the explicit
          # version tag. For release: [published], use the release tag. Fall
          # back to github.ref for tag-push triggers.
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Debug APKs (both flavors)
        run: cd android && ./gradlew assemblePlayDebug assembleFdroidDebug --no-daemon

      - name: Build Android Release APKs (unsigned, both flavors)
        run: cd android && ./gradlew assemblePlayRelease assembleFdroidRelease --no-daemon
        continue-on-error: true

      - name: Rename APK files
        run: |
          mkdir -p release-artifacts
          # Debug variants — Gradle outputs are app-{flavor}-debug.apk
          if [ -f android/app/build/outputs/apk/play/debug/app-play-debug.apk ]; then
            cp android/app/build/outputs/apk/play/debug/app-play-debug.apk release-artifacts/TrueAI-LocalAI-debug.apk
          fi
          # Release variants — unsigned suffix only present when no signing config attached.
          for f in \
            android/app/build/outputs/apk/play/release/app-play-release-unsigned.apk \
            android/app/build/outputs/apk/play/release/app-play-release.apk; do
            if [ -f "$f" ]; then
              cp "$f" release-artifacts/TrueAI-LocalAI-play-release.apk
              break
            fi
          done
          for f in \
            android/app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk \
            android/app/build/outputs/apk/fdroid/release/app-fdroid-release.apk; do
            if [ -f "$f" ]; then
              cp "$f" release-artifacts/TrueAI-LocalAI-fdroid-release.apk
              break
            fi
          done

      - name: Get version
        id: version
        run: |
          # Use the tag resolved in the resolve step, strip the leading 'v'.
          TAG="${{ steps.resolve.outputs.tag }}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            # TrueAI LocalAI Release ${{ steps.version.outputs.version }}

            ## Installation

            Download the APK file and install it on your Android device:
            - **TrueAI-LocalAI-debug.apk** — Debug build (Play flavor) for testing
            - **TrueAI-LocalAI-play-release.apk** — Play-flavor release (unsigned) for sideloading
            - **TrueAI-LocalAI-fdroid-release.apk** — F-Droid-flavor release (unsigned) for sideloading

            For the signed Play Store AAB, use the **Play Release** workflow.
            For the F-Droid self-hosted repo, use the **F-Droid Repo** workflow.

            ## What's New in this Release

            **Major architecture changes**
            - **Local LLM runtime replaces the GitHub Spark hosted
              runtime.** `useKV`, `spark.llm`, `spark.llmPrompt`, and
              `spark.kv` are now aliased to local shims under
              `src/lib/llm-runtime/`. The app no longer depends on
              Spark's hosted backend.
            - **Pluggable LLM runtime config** layered as: hard-coded
              defaults < `public/runtime.config.json` < KV key
              `__llm_runtime_config__` written by Settings → LLM
              Runtime UI.
            - **Full Capacitor native-mobile capability layer**
              (secure storage, network, clipboard, share, haptics,
              app-lifecycle, notifications, filesystem) under
              `src/lib/native/`, with web fallbacks.
            - **API key stored securely on device** via Capacitor
              Preferences on native (IndexedDB on web), never via
              localStorage.

            **Security**
            - `kvStore.setSecure()` no longer leaks credentials to
              localStorage on IndexedDB transaction failure.
            - **Vite ^7.3.2** (CVE patches: `server.fs.deny` bypass,
              dev WebSocket arbitrary file read).
            - Transitive CVE pins via npm `overrides`:
              `path-to-regexp ^8.4.0`, `postcss ^8.5.10`,
              `lodash ^4.17.24`, `brace-expansion@1 ^1.1.13`.
            - Filename sanitiser hardened.

            **Rolled-up fixes (from un-published v5.0.0 / v5.1.0)**
            - Active tab persists across reloads with a validated
              `TabName` guard.
            - Rapid tab switching unblocked.
            - App Builder is now in the Android mobile bottom nav.
            - UI aspect-ratio compatibility on Android phones —
              safe-area insets, tab bar, and main content reflow
              correctly across narrow / tall viewports.
            - Strict-typecheck warnings in `diagnostics` resolved.
            - `package-lock.json` regenerated; `npm ci` clean
              (0 vulnerabilities).
            - `build:dev` script restored (unblocks Android CI + local
              debug APK).

            **Versioning**
            - Android `versionName` bumped to `6.0.0` and `versionCode`
              to `8` so the new APK installs cleanly as an update.

            ## Features

            This release includes:
            - Complete mobile-optimized UI
            - Offline support with Service Worker
            - IndexedDB caching for better performance
            - Android-specific optimizations
            - Full Capacitor integration

            ## Requirements

            - Android 7.0 (API level 24) or higher
            - Approximately 50MB of storage space

            ## Installation Instructions

            1. Download the APK file
            2. Enable "Install from Unknown Sources" in your Android settings
            3. Open the downloaded APK file
            4. Follow the installation prompts
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
