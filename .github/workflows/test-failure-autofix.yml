name: Test Failure Auto-Fix Dispatch

# Listens for failures of the "Android CI" workflow on copilot/* branches and
# automatically creates a GitHub Issue assigned to the Copilot coding agent so
# it can investigate and draft a fix.
#
# Only fires on copilot/* branches to avoid noise on human contributor PRs.
# The issue body includes the branch name, run URL, and a truncated log excerpt
# from the first failed job so the agent has immediate context.

on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
    branches:
      - "copilot/**"

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  dispatch:
    name: Create fix issue on failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "copilot-fix"    --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force
          gh label create "test-failure"   --color "e4e669" --description "CI / test failure"                   --repo "$REPO" --force
          gh label create "bug"            --color "ee0701" --description "Something is not working"            --repo "$REPO" --force

      - name: Fetch failed job logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          # List jobs and find the first failed one
          FAILED_JOB_ID=$(gh api \
            "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .id' \
            | head -1)

          if [ -z "$FAILED_JOB_ID" ]; then
            echo "No failed job found — skipping."
            echo "log_excerpt=No failed job log available." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "failed_job_id=$FAILED_JOB_ID" >> "$GITHUB_OUTPUT"

          # Download the log (plain text)
          gh api "repos/$REPO/actions/jobs/$FAILED_JOB_ID/logs" > /tmp/job.log 2>&1 || true

          # Extract last 100 lines and cap at 8,000 chars for the issue body
          tail -100 /tmp/job.log | head -c 8000 > /tmp/log_excerpt.txt

          # Escape backticks so they don't break the markdown code block
          sed -i 's/`/\\`/g' /tmp/log_excerpt.txt

          echo "log_excerpt<<LOG_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/log_excerpt.txt    >> "$GITHUB_OUTPUT"
          echo "LOG_EOF"              >> "$GITHUB_OUTPUT"

      - name: Find associated PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        env:
          BRANCH:   ${{ github.event.workflow_run.head_branch }}
          RUN_URL:  ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_REF:   ${{ steps.pr.outputs.pr_number && format('Fixes #{0}', steps.pr.outputs.pr_number) || '' }}
        run: |
          cat > /tmp/issue_body.md <<'BODY_EOF'
          ## Auto-generated by Test Failure Auto-Fix Dispatch

          | Field | Value |
          |---|---|
          | **Bug type** | `test-failure` |
          | **Branch** | `${{ env.BRANCH }}` |
          | **Commit** | `${{ env.HEAD_SHA }}` |
          | **CI run** | [${{ env.RUN_URL }}](${{ env.RUN_URL }}) |
          ${{ env.PR_REF && format('| **PR** | {0} |', env.PR_REF) || '' }}

          ### Failed job log (last 100 lines)

          ```
          ${{ steps.logs.outputs.log_excerpt }}
          ```

          ### Constraints the fix MUST satisfy

          - [ ] All existing unit tests still pass (`npm test`)
          - [ ] `npm run lint` exits 0 (no new errors)
          - [ ] `npm run build:dev` succeeds
          - [ ] CodeQL must not introduce new alerts
          - [ ] `package.json` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent

          1. Check out branch `${{ env.BRANCH }}` and reproduce the failure locally with `npm test` or `npm run android:build`.
          2. Read the log excerpt above to identify the failing test(s) or build step.
          3. Fix only the identified failure — do not refactor unrelated code.
          4. Run `npm run lint`, `npm run build:dev`, and `npm test` before pushing.
          5. Push to the same branch (`${{ env.BRANCH }}`) — do NOT open a new branch; this keeps the existing PR updated.
          6. Fill in the `## Lessons learned` section of the PR description.
          BODY_EOF

      - name: Create fix issue
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          REPO:      ${{ github.repository }}
          BRANCH:    ${{ github.event.workflow_run.head_branch }}
          RUN_URL:   ${{ github.event.workflow_run.html_url }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[Auto] CI failure on ${{ env.BRANCH }}" \
            --body-file /tmp/issue_body.md \
            --label "copilot-fix,test-failure,bug" \
            --assignee "copilot")
          echo "Created issue: $ISSUE_URL"

          # If we found a PR, comment there too so the developer sees it inline.
          if [ -n "${{ steps.pr.outputs.pr_number }}" ]; then
            gh pr comment "${{ steps.pr.outputs.pr_number }}" \
              --repo "$REPO" \
              --body "🔴 CI failed on this branch. A fix issue has been dispatched to Copilot: $ISSUE_URL"
          fi
