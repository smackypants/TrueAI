name: Dependabot Auto-Merge

# Enables GitHub's auto-merge (squash) on Dependabot pull requests so
# patch and minor security/version bumps land hands-off once CI passes
# and CODEOWNERS approval is granted.
#
# IMPORTANT — this does NOT remove the owner-approval gate. The
# default-branch ruleset (`protect-default-branch.json`) still
# requires:
#   - 1 approving review from CODEOWNERS (i.e. the owner) AND
#   - all required status checks green (CodeQL JS/TS, CodeQL Java/Kotlin,
#     Android CI) AND
#   - all review threads resolved.
#
# This workflow only flips the "Enable auto-merge" toggle so the PR
# merges automatically the moment those conditions go green. Owner can
# still dismiss approval or request changes to halt it.
#
# Required repo settings (Settings → General → Pull Requests):
#   ✅ Allow auto-merge
#   ✅ Allow squash merging
#   ✅ Allow GitHub Actions to create and approve pull requests
#      (Settings → Actions → General → Workflow permissions)
#
# Major-version bumps:
#   - Non-security majors → owner comment only (manual review required)
#   - Security-relevant majors (GHSA present) → Copilot issue dispatched so
#     the agent can evaluate whether the upgrade is safe or whether a
#     package.json overrides pin is the right mitigation.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for non-major bumps
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Comment on skipped major bumps
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-major' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body \
            "Skipping auto-merge: this is a **major version bump** (${{ steps.metadata.outputs.dependency-names }} → ${{ steps.metadata.outputs.new-version }}). Please review the changelog manually before merging."

      # ── Security-relevant major bumps → Copilot auto-fix issue ─────────
      # Only fires when Dependabot links one or more GHSA advisories AND it's
      # a major-version bump, meaning a semver-compatible patch is unavailable.
      - name: Ensure labels exist (security major)
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.ghsa-ids != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "copilot-fix"    --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force
          gh label create "security"       --color "d73a4a" --description "Security finding"                    --repo "$REPO" --force
          gh label create "dependency-vuln" --color "e11d48" --description "Vulnerable dependency"              --repo "$REPO" --force

      - name: Create Copilot triage issue for security major bump
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.ghsa-ids != ''
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          REPO:           ${{ github.repository }}
          DEP_NAMES:      ${{ steps.metadata.outputs.dependency-names }}
          OLD_VERSION:    ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION:    ${{ steps.metadata.outputs.new-version }}
          GHSA_IDS:       ${{ steps.metadata.outputs.ghsa-ids }}
          CVSS:           ${{ steps.metadata.outputs.cvss }}
          PR_URL:         ${{ github.event.pull_request.html_url }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
        run: |
          ISSUE_BODY="## Auto-generated by Dependabot Auto-Merge

          Dependabot opened a **major-version security bump** that cannot be
          auto-merged without manual review. Please evaluate whether the upgrade
          is safe to apply or whether a \`package.json\` \`overrides\` pin is
          the right short-term mitigation.

          | Field | Value |
          |---|---|
          | **Bug type** | \`dependency-vuln\` |
          | **Package(s)** | \`$DEP_NAMES\` |
          | **Current version** | \`$OLD_VERSION\` |
          | **Patched version** | \`$NEW_VERSION\` |
          | **Advisories** | $GHSA_IDS |
          | **CVSS** | $CVSS |
          | **Dependabot PR** | [#$PR_NUMBER]($PR_URL) |

          ### Constraints the fix MUST satisfy

          - [ ] All existing unit tests still pass (\`npm test\`)
          - [ ] \`npm run lint\` exits 0 (no new errors)
          - [ ] \`npm run build:dev\` succeeds
          - [ ] CodeQL must not introduce new alerts
          - [ ] \`package.json\` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent

          1. Review the advisories listed above and the Dependabot PR.
          2. **Option A — upgrade:** if the major bump is safe (no breaking API
             changes in code we call), bump the dependency, run \`npm ci\`, fix
             any resulting build/test failures, and open a PR.
          3. **Option B — overrides pin:** if the upgrade is not yet feasible,
             add or tighten a \`package.json\` \`overrides\` entry so the
             vulnerable transitive version is replaced, without breaking the
             build. Never weaken an existing overrides pin.
          4. Use branch name: \`copilot/fix-dep-$(echo '$DEP_NAMES' | tr ' ,' '--' | tr '[:upper:]' '[:lower:]')-$NEW_VERSION\`
          5. Fill in the \`## Lessons learned\` section of the PR description."

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[Security] Major dependency bump requires triage: $DEP_NAMES ($OLD_VERSION → $NEW_VERSION)" \
            --body "$ISSUE_BODY" \
            --label "copilot-fix,security,dependency-vuln" \
            --assignee "copilot")
          echo "Created Copilot triage issue: $ISSUE_URL"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "🔐 This security major bump has been dispatched to the Copilot coding agent for triage: $ISSUE_URL"
