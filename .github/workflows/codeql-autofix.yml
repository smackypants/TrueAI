name: CodeQL Auto-Fix Dispatch

# Listens for new or reopened code-scanning alerts and automatically creates
# a GitHub Issue assigned to the Copilot coding agent so it can draft a fix.
#
# Severity routing:
#   critical / high  → issue assigned to @copilot with high-priority labels
#   medium / low     → issue assigned to @copilot with needs-triage label
#                      (fix only after higher-priority issues are resolved)
#
# Prerequisites (owner must complete once):
#   Settings → Security → Code security → enable Code scanning
#   Without Code Scanning enabled the "code_scanning_alert" event never fires.

on:
  code_scanning_alert:
    types: [created, reopened]

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  dispatch:
    name: Dispatch fix issue
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "copilot-fix"   --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force
          gh label create "security"      --color "d73a4a" --description "Security finding"                      --repo "$REPO" --force
          gh label create "bug"           --color "ee0701" --description "Something is not working"              --repo "$REPO" --force
          gh label create "needs-triage"  --color "e4e669" --description "Low-priority finding awaiting triage" --repo "$REPO" --force

      - name: Build issue body
        id: body
        env:
          ALERT_NUMBER:   ${{ github.event.alert.number }}
          RULE_ID:        ${{ github.event.alert.rule.id }}
          RULE_DESC:      ${{ github.event.alert.rule.description }}
          SEVERITY:       ${{ github.event.alert.rule.security_severity_level }}
          MESSAGE:        ${{ github.event.alert.most_recent_instance.message.text }}
          FILE_PATH:      ${{ github.event.alert.most_recent_instance.location.path }}
          START_LINE:     ${{ github.event.alert.most_recent_instance.location.start_line }}
          TOOL_NAME:      ${{ github.event.alert.tool.name }}
          ALERT_HTML_URL: ${{ github.event.alert.html_url }}
        run: |
          cat > /tmp/issue_body.md <<'BODY_EOF'
          ## Auto-generated by CodeQL Auto-Fix Dispatch

          | Field | Value |
          |---|---|
          | **Bug type** | `codeql-alert` |
          | **Severity** | `${{ env.SEVERITY }}` |
          | **Tool** | ${{ env.TOOL_NAME }} |
          | **Rule** | `${{ env.RULE_ID }}` — ${{ env.RULE_DESC }} |
          | **File** | `${{ env.FILE_PATH }}:${{ env.START_LINE }}` |
          | **Alert** | [#${{ env.ALERT_NUMBER }}](${{ env.ALERT_HTML_URL }}) |

          ### Finding

          ${{ env.MESSAGE }}

          ### Constraints the fix MUST satisfy

          - [ ] All existing unit tests still pass (`npm test`)
          - [ ] `npm run lint` exits 0 (no new errors)
          - [ ] `npm run build:dev` succeeds
          - [ ] CodeQL must not introduce new alerts
          - [ ] `package.json` overrides pins must not be weakened
          - [ ] No telemetry, analytics, or third-party network calls added

          ### Instructions for Copilot agent

          1. Read the alert at the link above and the file at `${{ env.FILE_PATH }}:${{ env.START_LINE }}`.
          2. Fix only the identified vulnerability — do not refactor unrelated code.
          3. Use branch name: `copilot/fix-codeql-${{ env.ALERT_NUMBER }}-$(echo "${{ env.RULE_ID }}" | tr '/' '-' | tr ' ' '-' | tr '[:upper:]' '[:lower:]')`
          4. Run `npm run lint`, `npm run build:dev`, and `npm test` before opening the PR.
          5. Fill in the `## Lessons learned` section of the PR description.
          BODY_EOF

          echo "body_file=/tmp/issue_body.md" >> "$GITHUB_OUTPUT"

      # ── high / critical: assign directly to the Copilot agent ──────────────
      - name: Create issue (critical/high) → assign to Copilot
        if: >
          github.event.alert.rule.security_severity_level == 'critical' ||
          github.event.alert.rule.security_severity_level == 'high'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ALERT_NUMBER: ${{ github.event.alert.number }}
          RULE_ID: ${{ github.event.alert.rule.id }}
          SEVERITY: ${{ github.event.alert.rule.security_severity_level }}
          FILE_PATH: ${{ github.event.alert.most_recent_instance.location.path }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[CodeQL ${{ env.SEVERITY }}] ${{ env.RULE_ID }} in ${{ env.FILE_PATH }} (alert #${{ env.ALERT_NUMBER }})" \
            --body-file "${{ steps.body.outputs.body_file }}" \
            --label "copilot-fix,security,bug" \
            --assignee "copilot")
          echo "Created issue: $ISSUE_URL"

      # ── medium / low: create issue assigned to Copilot with needs-triage label ─
      - name: Create issue (medium/low) → Copilot triage
        if: >
          github.event.alert.rule.security_severity_level == 'medium' ||
          github.event.alert.rule.security_severity_level == 'low' ||
          github.event.alert.rule.security_severity_level == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ALERT_NUMBER: ${{ github.event.alert.number }}
          RULE_ID: ${{ github.event.alert.rule.id }}
          SEVERITY: ${{ github.event.alert.rule.security_severity_level }}
          FILE_PATH: ${{ github.event.alert.most_recent_instance.location.path }}
        run: |
          # Prepend a low-priority note to the existing body before creating the issue
          cat > /tmp/lowpri_prefix.md <<'PREFIX_EOF'
          ## ⚠️ Low-priority finding — fix after higher-priority issues

          This is a **low/medium** severity CodeQL finding. Address it only after
          all `critical` and `high` severity issues are resolved.

          ---

          PREFIX_EOF
          cat /tmp/lowpri_prefix.md "${{ steps.body.outputs.body_file }}" > /tmp/lowpri_issue_body.md

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "[CodeQL low-priority] ${{ env.RULE_ID }} in ${{ env.FILE_PATH }} (alert #${{ env.ALERT_NUMBER }})" \
            --body-file /tmp/lowpri_issue_body.md \
            --label "copilot-fix,needs-triage,security,bug" \
            --assignee "copilot")
          echo "Created low-priority issue: $ISSUE_URL"
