Categories:
  - Internet
  - Writing
License: MIT
AuthorName: TrueAI LocalAI Contributors
SourceCode: https://github.com/smackypants/trueai-localai
IssueTracker: https://github.com/smackypants/trueai-localai/issues
Changelog: https://github.com/smackypants/trueai-localai/blob/HEAD/CHANGELOG.md

AutoName: TrueAI LocalAI

# The app talks to a user-configured remote LLM endpoint by default,
# which F-Droid considers a "non-free network service" — disclose it.
AntiFeatures:
  - NonFreeNet

RepoType: git
Repo: https://github.com/smackypants/trueai-localai.git

Builds:
  - versionName: 6.0.0
    versionCode: 8
    commit: v6.0.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y --no-install-recommends nodejs npm
    init: cd ../../ && npm ci
    prebuild:
      - cd ../../ && npm run build
      - cd ../../ && npx --no-install cap sync android
    gradle:
      - fdroid

# F-Droid bot will look for new git tags matching `v%v` and auto-bump
# this metadata; no manual file edits needed for subsequent releases.
AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: 8.0.0
CurrentVersionCode: 13
