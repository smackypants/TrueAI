# F-Droid build recipe for TrueAI LocalAI.
#
# This file is the ready-to-paste build recipe for the official F-Droid
# catalog at https://gitlab.com/fdroid/fdroiddata. It is NOT consumed by
# anything in this repository — see ../../FDROID.md for the submission
# process.
#
# When updating: bump the entry under `Builds:`, `CurrentVersion`, and
# `CurrentVersionCode` in lock-step with android/app/build.gradle.

Categories:
  - Internet
  - Development
License: MIT
AuthorName: smackypants / Advanced Technology Research
AuthorWebSite: https://advancedtechnologyresearch.com/
WebSite: https://github.com/smackypants/trueai-localai
SourceCode: https://github.com/smackypants/trueai-localai
IssueTracker: https://github.com/smackypants/trueai-localai/issues
Changelog: https://github.com/smackypants/trueai-localai/blob/main/CHANGELOG.md

AutoName: TrueAI LocalAI

AntiFeatures:
  NonFreeNet:
    en-US: >-
      The user can optionally configure the LLM runtime to talk to a
      hosted OpenAI-compatible provider (OpenAI, Anthropic, Together,
      etc.). The default configuration is fully local (Ollama on
      http://localhost:11434) and the app performs no outbound network
      call until the user opts in.

RepoType: git
Repo: https://github.com/smackypants/trueai-localai

Builds:
  - versionName: 6.0.0
    versionCode: 8
    commit: v6.0.0
    sudo:
      - apt-get update
      - apt-get install -y openjdk-21-jdk-headless nodejs npm
    init:
      - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
    subdir: android/app
    gradle:
      - yes
    rm:
      - android/app/google-services.json
    scanignore:
      - node_modules
    prebuild:
      - npm ci
      - npm run build
      - npx cap sync android
    output: build/outputs/apk/release/app-release-unsigned.apk

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 6.0.0
CurrentVersionCode: 8
